<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History · Fuckitt's Funhouse</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
.page { max-width:600px; margin:0 auto; padding:24px 16px 48px; }

.page-title { font-family:'Cinzel',serif; font-size:1.6rem; font-weight:900; color:var(--gold); margin-bottom:4px; }
.page-sub   { color:var(--muted); font-size:0.82rem; letter-spacing:1px; margin-bottom:24px; }

/* ── STATS ROW ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
.stat-box  { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
.stat-label { color:var(--muted); font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.stat-val   { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--gold); }
.stat-val.green { color:var(--green); }
.stat-val.red   { color:var(--red); }

/* ── FILTERS ── */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:0.78rem; cursor:pointer;
  transition:all 0.15s;
}
.filter-btn.active { border-color:var(--gold); color:var(--gold); background:#d4af3715; }

/* ── BET LIST ── */
.bet-list { display:flex; flex-direction:column; gap:8px; }

.bet-row {
  background:var(--card-bg); border:1px solid var(--border); border-radius:12px;
  padding:12px 16px; display:grid;
  grid-template-columns:auto 1fr auto auto;
  align-items:center; gap:12px;
  border-left:3px solid var(--border);
  animation:fadeIn 0.2s ease;
}
.bet-row.win  { border-left-color:var(--green); }
.bet-row.lose { border-left-color:var(--red); }
.bet-row.push { border-left-color:var(--muted); }

.bet-icon  { font-size:1.4rem; line-height:1; }
.bet-info  { min-width:0; }
.bet-game  { font-family:'Cinzel',serif; font-size:0.85rem; color:var(--text); }
.bet-meta  { color:var(--muted); font-size:0.72rem; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bet-amt   { font-family:'Cinzel',serif; font-size:0.95rem; text-align:right; white-space:nowrap; }
.bet-row.win  .bet-amt { color:var(--green); }
.bet-row.lose .bet-amt { color:var(--red); }
.bet-row.push .bet-amt { color:var(--muted); }
.bet-bal   { color:var(--muted); font-size:0.72rem; text-align:right; white-space:nowrap; }

.bet-verify { background:transparent; border:1px solid var(--border); color:var(--muted);
  padding:3px 8px; border-radius:6px; font-size:0.68rem; cursor:pointer; white-space:nowrap;
  transition:all 0.15s; }
.bet-verify:hover { border-color:var(--green); color:var(--green); }

/* ── VERIFY MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:#000a; z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal {
  background:var(--card-bg); border:1px solid var(--border); border-radius:16px;
  padding:24px; width:100%; max-width:480px;
  box-shadow:0 0 60px #000c;
}
.modal-title { font-family:'Cinzel',serif; color:var(--gold); font-size:1rem; margin-bottom:16px; }
.modal-close { float:right; background:transparent; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; }
.modal-field { margin-bottom:10px; }
.modal-field label { display:block; color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.modal-field .val  { font-family:monospace; font-size:0.78rem; color:var(--text); word-break:break-all; background:#060e16; padding:6px 10px; border-radius:6px; border:1px solid var(--border); }
.verify-result { margin-top:12px; padding:10px; border-radius:8px; font-size:0.85rem; text-align:center; }
.verify-result.ok   { background:#27ae6020; border:1px solid #27ae6060; color:var(--green); }
.verify-result.fail { background:#c0392b20; border:1px solid #c0392b60; color:var(--red); }

/* ── EMPTY / LOADING ── */
.empty { text-align:center; padding:48px 0; color:var(--muted); font-size:0.9rem; }
.loading-row { display:flex; flex-direction:column; gap:8px; }
.skeleton { background:var(--card-bg); border-radius:12px; height:64px; animation:pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

.load-more { width:100%; margin-top:16px; padding:12px; background:transparent;
  border:1px solid var(--border); border-radius:10px; color:var(--muted);
  font-size:0.85rem; cursor:pointer; transition:all 0.15s; }
.load-more:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head>
<body>

<div class="site-header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <a class="btn-back" href="index.html">‹ Lobby</a>
      <a href="index.html"><img src="../logo.svg" class="graffiti-logo-sm" alt="Fuckitt's Funhouse"></a>
    </div>
    <div class="header-right">
      <div class="user-chip"><span class="dot online" id="statusDot"></span><span id="userLabel"></span></div>
      <button class="btn-ghost" onclick="doLogout()">Logout</button>
    </div>
  </div>
</div>

<div class="balance-bar">
  <span class="balance-label">Balance</span>
  <span class="balance-amount">$<span id="bal">0</span></span>
</div>

<div class="page">
  <div class="page-title">📋 Bet History</div>
  <div class="page-sub">Your complete wagering record</div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-label">Total Bets</div><div class="stat-val" id="statTotal">—</div></div>
    <div class="stat-box"><div class="stat-label">Wagered</div><div class="stat-val" id="statWagered">—</div></div>
    <div class="stat-box"><div class="stat-label">Net P&L</div><div class="stat-val" id="statPnl">—</div></div>
    <div class="stat-box"><div class="stat-label">Win Rate</div><div class="stat-val" id="statWinRate">—</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('coin', this)">🪙 Coin</button>
    <button class="filter-btn" onclick="setFilter('dice', this)">🎲 Dice</button>
    <button class="filter-btn" onclick="setFilter('slots', this)">🎰 Slots</button>
    <button class="filter-btn" onclick="setFilter('win', this)">✅ Wins</button>
    <button class="filter-btn" onclick="setFilter('lose', this)">❌ Losses</button>
  </div>

  <div class="bet-list" id="betList">
    <div class="loading-row">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
  <button class="load-more" id="loadMore" style="display:none" onclick="loadMore()">Load More</button>
</div>

<!-- Verify Modal -->
<div class="modal-overlay" id="verifyModal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('verifyModal').style.display='none'">✕</button>
    <div class="modal-title">🔐 Verify Bet</div>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-logo-wrap"><img src="../logo.svg" class="graffiti-logo-xs" alt="Fuckitt's Funhouse"></div>
  <div class="footer-tagline">Play Smart · Win Big · No Regrets</div>
  <div class="footer-links">
    <a href="index.html">🏠 Lobby</a>
    <a href="coin.html">🪙 Coin</a>
    <a href="dice.html">🎲 Dice</a>
    <a href="slots.html">🎰 Slots</a>
    <a href="crash.html">🚀 Crash</a>
    <a href="mines.html">💣 Mines</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="history.html">📋 History</a>
  </div>
  <div class="footer-copy">© 2024 Fuckitt's Funhouse · For entertainment purposes only</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/shared.js"></script>
<script src="../js/provably-fair.js"></script>
<script>
  guardPage();
  initNav();

  const ICONS  = { coin:'🪙', dice:'🎲', slots:'🎰', crash:'🚀', mines:'💣' };
  const PAGE_SIZE = 20;
  let allBets  = [];
  let filtered = [];
  let shown    = 0;
  let activeFilter = 'all';

  async function loadBets() {
    const session = await getSession();
    const { data, error } = await db
      .from('bets')
      .select('id, game, amount, outcome, balance_after, server_seed, server_seed_hash, client_seed, nonce, created_at')
      .eq('user_id', session.user.id)
      .order('created_at', { ascending: false })
      .limit(500);

    if (error || !data) { document.getElementById('betList').innerHTML = '<div class="empty">Failed to load history</div>'; return; }

    allBets = data;
    computeStats(data);
    applyFilter(activeFilter);
  }

  function computeStats(bets) {
    const total    = bets.length;
    const wagered  = bets.reduce((s, b) => s + b.amount, 0);
    const pnl      = bets.reduce((s, b) => s + b.outcome.delta, 0);
    const wins     = bets.filter(b => b.outcome.win).length;

    document.getElementById('statTotal').textContent   = total;
    document.getElementById('statWagered').textContent = '$' + wagered.toLocaleString();
    const pnlEl = document.getElementById('statPnl');
    pnlEl.textContent  = (pnl >= 0 ? '+' : '') + '$' + pnl.toLocaleString();
    pnlEl.className    = 'stat-val ' + (pnl >= 0 ? 'green' : 'red');
    document.getElementById('statWinRate').textContent = total ? Math.round(wins/total*100) + '%' : '—';
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(f);
  }

  function applyFilter(f) {
    if (f === 'all')  filtered = allBets;
    else if (f === 'win')  filtered = allBets.filter(b => b.outcome.win);
    else if (f === 'lose') filtered = allBets.filter(b => !b.outcome.win && b.outcome.delta !== 0);
    else filtered = allBets.filter(b => b.game === f);
    shown = 0;
    renderBets(true);
  }

  function renderBets(reset) {
    const list = document.getElementById('betList');
    if (reset) list.innerHTML = '';
    if (!filtered.length) { list.innerHTML = '<div class="empty">No bets found</div>'; document.getElementById('loadMore').style.display='none'; return; }

    const slice = filtered.slice(shown, shown + PAGE_SIZE);
    slice.forEach(bet => list.appendChild(buildRow(bet)));
    shown += slice.length;
    document.getElementById('loadMore').style.display = shown < filtered.length ? 'block' : 'none';
  }

  function loadMore() { renderBets(false); }

  function buildRow(bet) {
    const win    = bet.outcome.win;
    const push   = bet.outcome.delta === 0;
    const cls    = push ? 'push' : win ? 'win' : 'lose';
    const delta  = bet.outcome.delta;
    const amtStr = push ? '±$0' : (delta > 0 ? '+' : '−') + '$' + Math.abs(delta);
    const result = Array.isArray(bet.outcome.result) ? bet.outcome.result.join(' ') : bet.outcome.result;
    const date   = new Date(bet.created_at).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const row = document.createElement('div');
    row.className = 'bet-row ' + cls;
    row.innerHTML = `
      <div class="bet-icon">${ICONS[bet.game]}</div>
      <div class="bet-info">
        <div class="bet-game">${bet.game.charAt(0).toUpperCase()+bet.game.slice(1)} · $${bet.amount} bet</div>
        <div class="bet-meta">${escapeHtml(String(result))} · ${date}</div>
      </div>
      <div>
        <div class="bet-amt">${amtStr}</div>
        <div class="bet-bal">bal $${bet.balance_after}</div>
      </div>
      <button class="bet-verify" onclick="openVerify(${bet.id})">Verify</button>`;
    return row;
  }

  function normalizeArray(values) {
    return Array.isArray(values) ? values.map(Number).filter(Number.isFinite).sort((a,b) => a-b) : [];
  }

  function compareDerivedOutcome(game, derived, expected) {
    if (game === 'mines') {
      const derivedSet = new Set(normalizeArray(derived));
      const expectedCells = normalizeArray(expected);
      if (!expectedCells.length) return false;
      return expectedCells.every(cell => !derivedSet.has(cell));
    }
    return JSON.stringify(derived) === JSON.stringify(expected);
  }

  async function openVerify(betId) {
    const bet = allBets.find(b => b.id === betId);
    if (!bet) return;

    const modal = document.getElementById('verifyModal');
    const content = document.getElementById('modalContent');
    modal.style.display = 'flex';

    const result = Array.isArray(bet.outcome.result) ? bet.outcome.result.join(' ') : bet.outcome.result;
    content.innerHTML = `
      <div class="modal-field"><label>Bet ID</label><div class="val">#${bet.id}</div></div>
      <div class="modal-field"><label>Game / Result</label><div class="val">${bet.game} · ${escapeHtml(String(result))}</div></div>
      <div class="modal-field"><label>Server Seed</label><div class="val">${escapeHtml(bet.server_seed)}</div></div>
      <div class="modal-field"><label>Server Seed Hash</label><div class="val">${escapeHtml(bet.server_seed_hash)}</div></div>
      <div class="modal-field"><label>Client Seed</label><div class="val">${escapeHtml(bet.client_seed)}</div></div>
      <div class="modal-field"><label>Nonce</label><div class="val">${bet.nonce}</div></div>
      <div class="verify-result" id="verifyOut">Verifying…</div>`;

    // Re-derive and check
    const derived = await verifyBet({ serverSeed: bet.server_seed, clientSeed: bet.client_seed, nonce: bet.nonce, game: bet.game });
    const hashBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(bet.server_seed));
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');

    const hashOk    = hashHex === bet.server_seed_hash;
    const outcomeOk = compareDerivedOutcome(bet.game, derived, bet.outcome.result);
    const ok = hashOk && outcomeOk;

    const out = document.getElementById('verifyOut');
    out.textContent = ok ? '✅ Verified — hash and outcome both match' : `❌ Mismatch — hash:${hashOk} outcome:${outcomeOk}`;
    out.className   = 'verify-result ' + (ok ? 'ok' : 'fail');
  }

  function closeModal(e) {
    if (e.target.id === 'verifyModal') document.getElementById('verifyModal').style.display = 'none';
  }

  loadBets();
</script>
</body>
</html>
