<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <!-- Spray paint texture -->
    <filter id="spray" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drip filter -->
    <filter id="drip">
      <feTurbulence type="turbulence" baseFrequency="0.05 0.8" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff7a0"/>
      <stop offset="30%"  stop-color="#f5e27a"/>
      <stop offset="60%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5c00"/>
    </linearGradient>
    <!-- Hot pink gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff9ff3"/>
      <stop offset="50%"  stop-color="#ff3cac"/>
      <stop offset="100%" stop-color="#a0006e"/>
    </linearGradient>
    <!-- Cyan gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a0ffff"/>
      <stop offset="50%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </linearGradient>
    <!-- Shadow gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background spray blobs -->
  <ellipse cx="80"  cy="60" rx="70" ry="45" fill="#ff3cac" opacity="0.07" filter="url(#spray)"/>
  <ellipse cx="210" cy="55" rx="90" ry="50" fill="#d4af37" opacity="0.08" filter="url(#spray)"/>
  <ellipse cx="340" cy="60" rx="70" ry="45" fill="#00d4ff" opacity="0.07" filter="url(#spray)"/>

  <!-- ═══ "FUCKITT'S" — wild style top line ═══ -->
  <!-- Shadow layer -->
  <text x="6" y="54"
    font-family="Arial Black, Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="url(#shadowGrad)"
    letter-spacing="-1"
    transform="skewX(-6)"
    filter="url(#spray)">FUCKITT'S</text>

  <!-- Outline stroke (thick black) -->
  <text x="4" y="52"
    font-family="Arial Black, Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="none" stroke="#000" stroke-width="8" stroke-linejoin="round"
    letter-spacing="-1"
    transform="skewX(-6)">FUCKITT'S</text>

  <!-- Outline stroke (colored) -->
  <text x="4" y="52"
    font-family="Arial Black, Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="none" stroke="#ff3cac" stroke-width="4" stroke-linejoin="round"
    letter-spacing="-1"
    transform="skewX(-6)">FUCKITT'S</text>

  <!-- Main fill -->
  <text x="4" y="52"
    font-family="Arial Black, Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="url(#goldGrad)"
    letter-spacing="-1"
    transform="skewX(-6)"
    filter="url(#spray)">FUCKITT'S</text>

  <!-- Highlight streak -->
  <text x="4" y="52"
    font-family="Arial Black, Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="none" stroke="#fff7a0" stroke-width="1.5" stroke-linejoin="round"
    letter-spacing="-1"
    transform="skewX(-6)" opacity="0.6">FUCKITT'S</text>

  <!-- ═══ "FUNHOUSE" — bigger, different angle ═══ -->
  <!-- Shadow -->
  <text x="8" y="108"
    font-family="Arial Black, Impact, sans-serif"
    font-size="56" font-weight="900"
    fill="url(#shadowGrad)"
    letter-spacing="2"
    transform="skewX(-8)"
    filter="url(#spray)">FUNHOUSE</text>

  <!-- Thick black outline -->
  <text x="6" y="106"
    font-family="Arial Black, Impact, sans-serif"
    font-size="56" font-weight="900"
    fill="none" stroke="#000" stroke-width="10" stroke-linejoin="round"
    letter-spacing="2"
    transform="skewX(-8)">FUNHOUSE</text>

  <!-- Colored outline -->
  <text x="6" y="106"
    font-family="Arial Black, Impact, sans-serif"
    font-size="56" font-weight="900"
    fill="none" stroke="#00d4ff" stroke-width="5" stroke-linejoin="round"
    letter-spacing="2"
    transform="skewX(-8)">FUNHOUSE</text>

  <!-- Main fill -->
  <text x="6" y="106"
    font-family="Arial Black, Impact, sans-serif"
    font-size="56" font-weight="900"
    fill="url(#pinkGrad)"
    letter-spacing="2"
    transform="skewX(-8)"
    filter="url(#spray)">FUNHOUSE</text>

  <!-- Highlight -->
  <text x="6" y="106"
    font-family="Arial Black, Impact, sans-serif"
    font-size="56" font-weight="900"
    fill="none" stroke="#fff" stroke-width="1.5"
    letter-spacing="2"
    transform="skewX(-8)" opacity="0.4">FUNHOUSE</text>

  <!-- ═══ Paint drips ═══ -->
  <g fill="#ff3cac" opacity="0.7" filter="url(#drip)">
    <ellipse cx="30"  cy="115" rx="3" ry="6"/>
    <ellipse cx="75"  cy="118" rx="2.5" ry="5"/>
    <ellipse cx="130" cy="116" rx="3" ry="7"/>
    <ellipse cx="185" cy="119" rx="2" ry="4"/>
    <ellipse cx="240" cy="117" rx="3" ry="6"/>
    <ellipse cx="295" cy="118" rx="2.5" ry="5"/>
    <ellipse cx="350" cy="116" rx="3" ry="7"/>
    <ellipse cx="400" cy="115" rx="2" ry="4"/>
  </g>
  <g fill="#d4af37" opacity="0.6" filter="url(#drip)">
    <ellipse cx="50"  cy="116" rx="2" ry="5"/>
    <ellipse cx="105" cy="119" rx="2.5" ry="6"/>
    <ellipse cx="160" cy="117" rx="2" ry="4"/>
    <ellipse cx="215" cy="118" rx="3" ry="7"/>
    <ellipse cx="270" cy="116" rx="2" ry="5"/>
    <ellipse cx="325" cy="119" rx="2.5" ry="6"/>
    <ellipse cx="380" cy="117" rx="2" ry="4"/>
  </g>

  <!-- ═══ Spray dots / stars ═══ -->
  <g fill="#fff7a0" opacity="0.5">
    <circle cx="15"  cy="20" r="1.5"/>
    <circle cx="390" cy="15" r="2"/>
    <circle cx="405" cy="40" r="1"/>
    <circle cx="8"   cy="80" r="1.5"/>
    <circle cx="415" cy="90" r="1"/>
  </g>
  <g fill="#ff3cac" opacity="0.4">
    <circle cx="200" cy="8"  r="2"/>
    <circle cx="380" cy="70" r="1.5"/>
    <circle cx="20"  cy="100" r="1"/>
  </g>

  <!-- ═══ Star accents ═══ -->
  <text x="0" y="30" font-size="14" fill="#f5e27a" opacity="0.8">★</text>
  <text x="400" y="30" font-size="12" fill="#00d4ff" opacity="0.7">✦</text>
  <text x="195" y="18" font-size="10" fill="#ff3cac" opacity="0.8">✶</text>
</svg>
